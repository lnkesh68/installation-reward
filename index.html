<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lucky Spin - Earning Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a2a3a, #0f1a24);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 16px;
    }

    .container {
      max-width: 500px;
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px 16px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 215, 0, 0.3);
    }

    h1 {
      text-align: center;
      font-size: 1.9rem;
      color: #FFD966;
      text-shadow: 0 2px 5px #00000050;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .sub {
      text-align: center;
      color: #ddd;
      font-size: 0.85rem;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    /* Wheel canvas */
    .wheel-wrapper {
      position: relative;
      margin: 10px auto 20px;
      width: min(280px, 70vw);
      height: min(280px, 70vw);
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      border-radius: 50%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), 0 0 0 8px #2c2c2c, 0 0 0 12px #f0b27a;
      transition: box-shadow 0.2s;
    }

    #spinBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: radial-gradient(circle, #ffcc33, #ff9900);
      border: none;
      border-radius: 50%;
      font-size: 1.5rem;
      font-weight: bold;
      color: #2c2c2c;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
      transition: 0.1s linear;
      z-index: 10;
      font-family: monospace;
    }

    #spinBtn:active {
      transform: translate(-50%, -50%) scale(0.94);
    }

    #spinBtn:disabled {
      opacity: 0.6;
      transform: translate(-50%, -50%) scale(0.96);
      cursor: not-allowed;
    }

    .result-area {
      background: #1e2a32;
      border-radius: 32px;
      padding: 14px 16px;
      margin-top: 20px;
      text-align: center;
      color: white;
      font-weight: 500;
      border-left: 4px solid #ffaa33;
    }

    .message {
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .extra-action {
      margin-top: 12px;
    }

    .btn-ad {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border: none;
      padding: 10px 18px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
    }

    .btn-ad:active {
      transform: scale(0.97);
    }

    .footer-note {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 18px;
      color: #aaa;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎡 LUCKY SPIN</h1>
  <div class="sub">Daily 1 free spin • Win big!</div>

  <div class="wheel-wrapper">
    <canvas id="wheelCanvas" width="500" height="500"></canvas>
    <button id="spinBtn">SPIN</button>
  </div>

  <div class="result-area" id="resultArea">
    <div class="message" id="resultMessage">✨ Tap SPIN and try your luck ✨</div>
    <div id="extraAction" class="extra-action"></div>
  </div>
  <div class="footer-note">⚡ ₹1, ₹3, ₹5, ₹20, ₹50 + Ads reward</div>
</div>

<script>
  // ----------------------------------------------
  //  REWARD SEGMENTS & WEIGHTS (₹1,3,5,20,50, ADS)
  // ----------------------------------------------
  const SEGMENTS = [
    { name: "₹1",    value: 1,    type: "cash", weight: 25 },
    { name: "₹3",    value: 3,    type: "cash", weight: 20 },
    { name: "₹5",    value: 5,    type: "cash", weight: 18 },
    { name: "₹20",   value: 20,   type: "cash", weight: 4 },
    { name: "₹50",   value: 50,   type: "cash", weight: 2 },
    { name: "🎁 Ads", value: "ads", type: "ads", weight: 12 }
  ];

  // Build segment angles based on weight distribution
  let totalWeight = SEGMENTS.reduce((s, seg) => s + seg.weight, 0);
  let segmentsWithAngle = [];
  let startAngle = 0;
  for (let seg of SEGMENTS) {
    let angle = (seg.weight / totalWeight) * 360;
    segmentsWithAngle.push({
      ...seg,
      start: startAngle,
      end: startAngle + angle,
      angle: angle
    });
    startAngle += angle;
  }

  // colors for segments (vibrant)
  const colorPalette = ["#FF5252", "#FF8A65", "#FFD966", "#4CAF50", "#2196F3", "#9C27B0", "#FFC107", "#E91E63"];
  let segmentColors = [];
  for (let i = 0; i < segmentsWithAngle.length; i++) {
    segmentColors.push(colorPalette[i % colorPalette.length]);
  }

  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  let spinning = false;
  let currentRotation = 0; // degrees
  let animationId = null;

  // Telegram WebApp object
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // Get user_id from URL query param
  const urlParams = new URLSearchParams(window.location.search);
  const userId = urlParams.get('user_id');
  if (!userId) {
    document.getElementById('resultMessage').innerHTML = "⚠️ Error: User ID missing. Restart bot.";
  }

  // Base API URL (Your bot's server) – needs to be same as WEBAPP_URL domain
  // We'll derive from current origin + maybe hardcode? But backend endpoint is on same domain as bot? 
  // The wheel is hosted on GitHub Pages, but the backend is on Railway. We'll use the bot's WebApp URL from ENV.
  // Since we don't know dynamically, we'll use relative? Actually GitHub Pages can't call railway directly due to CORS? 
  // But the bot's /spin-reward endpoint is CORS enabled? The previous bot has no CORS, but fetch should work because it's a GET.
  // We'll call the railway domain directly. The user's bot is hosted on Railway with WEBAPP_URL = "https://earning-bot-production.up.railway.app"
  const BACKEND_URL = "https://earning-bot-production.up.railway.app";  // from original code

  // Draw wheel function
  function drawWheel(rotationDeg = 0) {
    const size = canvas.width;
    const center = size / 2;
    const radius = center - 5;

    ctx.clearRect(0, 0, size, size);
    
    for (let i = 0; i < segmentsWithAngle.length; i++) {
      const seg = segmentsWithAngle[i];
      const start = seg.start + rotationDeg;
      const end = seg.end + rotationDeg;
      
      ctx.beginPath();
      ctx.moveTo(center, center);
      ctx.arc(center, center, radius, (start * Math.PI) / 180, (end * Math.PI) / 180);
      ctx.closePath();
      ctx.fillStyle = segmentColors[i];
      ctx.fill();
      ctx.save();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // draw text
      ctx.save();
      ctx.translate(center, center);
      ctx.rotate(((start + seg.angle / 2) + rotationDeg) * Math.PI / 180);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "bold 18px 'Segoe UI'";
      ctx.fillStyle = "#1f1f1f";
      const label = seg.name;
      ctx.fillText(label, radius * 0.65, 8);
      ctx.restore();
    }
    
    // draw center circle
    ctx.beginPath();
    ctx.arc(center, center, 22, 0, 2 * Math.PI);
    ctx.fillStyle = "#f5e6d3";
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(center, center, 18, 0, 2 * Math.PI);
    ctx.fillStyle = "#ffaa33";
    ctx.fill();
    // small arrow indicator (triangle at top)
    ctx.beginPath();
    ctx.moveTo(center - 12, 12);
    ctx.lineTo(center, 0);
    ctx.lineTo(center + 12, 12);
    ctx.fillStyle = "#FFD700";
    ctx.fill();
  }

  // Determine which segment is at the top (12 o'clock position) given current rotation
  function getCurrentSegment(rotation) {
    // Pointer direction is fixed at -90° (top = 12 o'clock) 
    // But we use simple method: The segment that contains angle = (360 - rotation) % 360 offset
    const pointerAngle = (360 - (rotation % 360)) % 360;
    for (let seg of segmentsWithAngle) {
      if (pointerAngle >= seg.start && pointerAngle < seg.end) {
        return seg;
      }
    }
    return segmentsWithAngle[0];
  }

  // Spin animation
  function spinWheel() {
    if (spinning) return;
    spinning = true;
    const spinBtn = document.getElementById('spinBtn');
    spinBtn.disabled = true;
    
    // random spins: 5 to 12 full rotations + random extra degrees
    const spinDegrees = 1800 + Math.random() * 1800; // 5 to 10 full spins
    const targetRotation = currentRotation + spinDegrees;
    const startTime = performance.now();
    const duration = 2500; // ms
    
    function animateSpin(now) {
      const elapsed = now - startTime;
      let t = Math.min(1, elapsed / duration);
      // easeOutCubic for smooth stop
      const easeOut = 1 - Math.pow(1 - t, 3);
      const newRotation = currentRotation + spinDegrees * easeOut;
      drawWheel(newRotation);
      if (t < 1) {
        animationId = requestAnimationFrame(animateSpin);
      } else {
        // spin finished
        currentRotation = targetRotation % 360;
        drawWheel(currentRotation);
        const finalSegment = getCurrentSegment(currentRotation);
        spinning = false;
        spinBtn.disabled = false;
        
        // handle reward
        handleReward(finalSegment);
      }
    }
    
    if (animationId) cancelAnimationFrame(animationId);
    animationId = requestAnimationFrame(animateSpin);
  }
  
  // Process reward after spin
  async function handleReward(segment) {
    const msgDiv = document.getElementById('resultMessage');
    const extraDiv = document.getElementById('extraAction');
    extraDiv.innerHTML = ''; // clear previous
    
    if (segment.type === "cash") {
      const amount = segment.value;
      msgDiv.innerHTML = `🎉 Congratulations! You won ₹${amount}! 🎉<br>Adding to wallet...`;
      // call backend /spin-reward
      try {
        const url = `${BACKEND_URL}/spin-reward?user_id=${userId}&amount=${amount}`;
        const response = await fetch(url);
        if (response.ok) {
          msgDiv.innerHTML = `✅ ₹${amount} credited to your balance! 🎊`;
        } else {
          msgDiv.innerHTML = `⚠️ Server error. Please contact support.`;
        }
      } catch (err) {
        console.error(err);
        msgDiv.innerHTML = `⚠️ Network error. Reward not added. Try again later.`;
      }
    } 
    else if (segment.type === "ads") {
      msgDiv.innerHTML = `🎁 You got an ADS TASK! 🎁<br>Watch an ad and earn ₹5 - ₹7 instantly!`;
      const watchAdUrl = `${BACKEND_URL}/ad?uid=${userId}&lang=en`; // lang from user? default en
      const btn = document.createElement('button');
      btn.innerText = "▶️ Watch Ad & Earn Now!";
      btn.className = "btn-ad";
      btn.onclick = () => {
        tg.openLink(watchAdUrl);
        // optionally close after opening? not needed
      };
      extraDiv.appendChild(btn);
      // Also send a notification to bot? Not necessary, user will get reward after ad.
    }
  }
  
  // Event listener for spin button
  document.getElementById('spinBtn').addEventListener('click', () => {
    // check daily limit: we rely on bot's existing limit per user (stored in DB)
    // But for smooth UX, just spin; if backend already prevents multiple, user will see no reward.
    spinWheel();
  });
  
  // initial draw
  drawWheel(currentRotation);
  
  // Optional: check if user already spun today via API? Not required, bot handles it.
  // Just to avoid spinning if already used, we can ask bot but skip for simplicity.
</script>
</body>
</html>
