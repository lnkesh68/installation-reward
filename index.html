<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Spin Reward Framework</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background: radial-gradient(circle at top,#facc15 0%,#1e1b4b 35%,#020617 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding: 20px 0;
}

.container{
    width:100%;
    max-width:440px;
    text-align:center;
    padding:20px;
}

.header h2{
    font-size:24px;
    color:#facc15;
    text-shadow:0 0 18px #facc15;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin: 20px 0;
}

.stat-box {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 12px;
    border-radius: 14px;
}

.stat-box span {
    display: block;
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.stat-box strong {
    font-size: 18px;
    color: #facc15;
    display: block;
    margin-top: 4px;
}

.wheel-wrapper{
    position:relative;
    width:320px;
    height:320px;
    margin:15px auto;
}

.pointer{
    position:absolute;
    top:-12px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-top:35px solid #ef4444;
    z-index:20;
    filter:drop-shadow(0 0 10px #ef4444);
}

/* FIX: Absolute parent context for nested rotation physics */
#wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:8px solid #fff;
    box-shadow:0 0 35px rgba(250,204,21,.4);
    transition:transform 5s cubic-bezier(0.17,0.67,0.25,1);
    position: relative;
    overflow: hidden;
    background:conic-gradient(
        #22c55e 0deg 45deg,
        #f97316 45deg 90deg,
        #06b6d4 90deg 135deg,
        #e11d48 135deg 180deg,
        #8b5cf6 180deg 225deg,
        #22c55e 225deg 270deg,
        #f59e0b 270deg 315deg,
        #dc2626 315deg 360deg
    );
}

.center-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:95px;
    height:95px;
    border-radius:50%;
    background:linear-gradient(135deg,#22c55e,#15803d);
    border:5px solid white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 20px rgba(34,197,94,.8);
    z-index: 25;
}

/* FIX: Real structural binding inside the moving wheel container */
.labels span{
    position:absolute;
    left: 50%;
    top: 50%;
    transform-origin: 0% 0%;
    font-weight:bold;
    font-size:14px;
    color:white;
    text-shadow:0 0 5px black;
    white-space: nowrap;
    margin-top: -10px; /* Center alignment math logic */
    margin-left: -5px;
}

.history-card {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 15px;
    margin-top: 25px;
    text-align: left;
    max-height: 180px;
    overflow-y: auto;
}

.history-card h4 {
    font-size: 14px;
    color: #facc15;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding-bottom: 5px;
}

.history-item {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 6px 0;
    border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
}

.history-item .status-success { color: #22c55e; font-weight: bold; }
.history-item .status-pending { color: #38bdf8; font-weight: bold; }

.popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:310px;
    background:linear-gradient(135deg,#111827,#1f2937);
    color:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 0 35px rgba(0,0,0,.7);
    z-index:100;
    text-align: center;
}

.popup h3{
    font-size: 18px;
    margin-bottom: 12px;
    color: #facc15;
    line-height: 1.4;
}

.popup p{
    font-size: 14px;
    color: #e2e8f0;
    margin-bottom: 15px;
}

.go-btn{
    display: inline-block;
    width: 100%;
    background: linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    padding: 12px 20px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    font-weight: bold;
    text-decoration: none;
    text-transform: uppercase;
}

.close-btn{
    display: inline-block;
    width: 100%;
    margin-top: 8px;
    background: #4b5563;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
}

.footer-btn{
    margin-top:15px;
    padding:14px 28px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    background:linear-gradient(135deg,#f59e0b,#dc2626);
    box-shadow:0 0 20px rgba(245,158,11,.6);
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 id="welcomeText">Welcome Gamer!</h2>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <span>Today's Reward</span>
            <strong id="todayReward">₹0.0</strong>
        </div>
        <div class="stat-box">
            <span>Total Reward</span>
            <strong id="totalReward">₹0.0</strong>
        </div>
    </div>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        
        <div id="wheel">
            <div class="labels">
                <span style="transform:rotate(22deg) translate(95px)">₹1</span>
                <span style="transform:rotate(67deg) translate(95px)">Go Ads</span>
                <span style="transform:rotate(112deg) translate(95px)">₹3</span>
                <span style="transform:rotate(157deg) translate(95px)">Go Ads</span>
                <span style="transform:rotate(202deg) translate(95px)">₹1.5</span>
                <span style="transform:rotate(247deg) translate(95px)">₹2</span>
                <span style="transform:rotate(292deg) translate(95px)">Go Ads</span>
                <span style="transform:rotate(337deg) translate(95px)">₹5</span>
            </div>
        </div>
        
        <div class="center-btn" onclick="spin()">SPIN</div>
    </div>

    <button class="footer-btn" id="footerSpinBtn" onclick="spin()">SPIN NOW</button>

    <div class="history-card">
        <h4>📋 Recent Spin History</h4>
        <div id="historyLogs"></div>
    </div>
</div>

<div class="popup" id="popup">
    <h3 id="popupText">Watch Ads & Install App To go reward</h3>
    <p id="popupSubText"></p>
    <button class="go-btn" id="goBtn" onclick="claimReward()">Go Ads</button>
    <button class="close-btn" id="closeBtn" onclick="closePopup()" style="display:none;">Close</button>
</div>

<script>
const rewards = ["₹1","Go Ads","₹3","Go Ads","₹1.5","₹2","Go Ads","₹5"];
const wheel = document.getElementById("wheel");
const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");
const popupSubText = document.getElementById("popupSubText");
const goBtn = document.getElementById("goBtn");
const closeBtn = document.getElementById("closeBtn");

// ==========================================
// ⚠️ REPLACEMENTS MANUALLY ALWAYS ⚠️
// ==========================================
const RENDER_BOT_URL = "https://earning-bot-1-c7aq.onrender.com/spin-reward"; 
const MONETAG_MINI_APP_LINK = "https://your_monetag_telegram_mini_app_ad_link_here";
// ==========================================

const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('user_id') || 'untracked_user';

let spinHistory = JSON.parse(localStorage.getItem(`spin_history_${userId}`)) || [];
updateStatsAndLogs();

function canSpinToday(){
    return localStorage.getItem(`lastSpin_${userId}`) !== new Date().toDateString();
}

let targetIndex = 0;

function spin(){
    if(!canSpinToday()){
        alert("Today's spin already used! Try again tomorrow.");
        return;
    }

    targetIndex = Math.floor(Math.random()*rewards.length);
    
    // FIX: Reverse alignment setup calculation framework
    let sliceDegree = 45;
    let targetOffset = (rewards.length - targetIndex) * sliceDegree;
    let angle = 3600 + targetOffset - 22.5; 
    
    wheel.style.transform = `rotate(${angle}deg)`;
    document.getElementById("footerSpinBtn").disabled = true;

    setTimeout(()=>{
        let result = rewards[targetIndex];
        popup.style.display="block";

        if(result === "Go Ads"){
            popupText.innerHTML = "Watch Ads & Install App To go reward";
            popupSubText.innerHTML = "Click below to install the sponsored app/task to unlock your ₹5-7 payout reward.";
            goBtn.style.display = "block";
            closeBtn.style.display = "none";
        } else {
            popupText.innerHTML = `Congratulations 🎉`;
            popupSubText.innerHTML = `You won ${result} directly! Connecting to Telegram wallet...`;
            goBtn.style.display = "none";
            closeBtn.style.display = "block";

            let wonAmount = parseFloat(result.replace('₹', ''));
            
            fetch(`${RENDER_BOT_URL}?user_id=${userId}&amount=${wonAmount}`)
            .then(response => {
                if(response.ok) {
                    popupSubText.innerHTML = `🎉 ${result} successfully added to your Bot balance!`;
                    saveHistoryLog(result, "Direct Win", "Success");
                } else {
                    popupSubText.innerHTML = `Database synchronization failed. Contact system support.`;
                }
            })
            .catch(() => {
                popupSubText.innerHTML = `Network timeout. Reward will auto-sync inside bot later.`;
            });
        }

        localStorage.setItem(`lastSpin_${userId}`, new Date().toDateString());
    }, 5000);
}

function claimReward() {
    if(rewards[targetIndex] === "Go Ads") {
        saveHistoryLog("Go Ads Task", "App Install", "Pending");
        window.location.href = MONETAG_MINI_APP_LINK + "?var=" + userId;
    }
}

function saveHistoryLog(item, type, status) {
    const logItem = {
        date: new Date().toLocaleDateString(),
        reward: item,
        type: type,
        status: status
    };
    spinHistory.unshift(logItem);
    localStorage.setItem(`spin_history_${userId}`, JSON.stringify(spinHistory));
    updateStatsAndLogs();
}

function updateStatsAndLogs() {
    let todayTotal = 0;
    let grandTotal = 0;
    const todayStr = new Date().toLocaleDateString();
    const logsContainer = document.getElementById("historyLogs");
    
    logsContainer.innerHTML = "";

    spinHistory.forEach(log => {
        if(log.status === "Success" || log.status === "Pending") {
            let numericVal = parseFloat(log.reward.replace('₹', '')) || 6.0;
            grandTotal += numericVal;
            if(log.date === todayStr) {
                todayTotal += numericVal;
            }
        }

        let statusClass = log.status === "Success" ? "status-success" : "status-pending";
        logsContainer.innerHTML += `
            <div class="history-item">
                <span>📅 ${log.date} - <strong>${log.reward}</strong> (${log.type})</span>
                <span class="${statusClass}">${log.status}</span>
            </div>
        `;
    });

    if(spinHistory.length === 0) {
        logsContainer.innerHTML = `<p style="font-size:12px; color:#64748b; text-align:center;">No spin operations tracked yet.</p>`;
    }

    document.getElementById("todayReward").innerText = "₹" + todayTotal.toFixed(1);
    document.getElementById("totalReward").innerText = "₹" + grandTotal.toFixed(1);
}

function closePopup() {
    popup.style.display = "none";
}
</script>

</body>
</html>
